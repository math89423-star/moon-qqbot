help: |
  本插件为纯库插件 (library plugin)，不注册任何命令或事件处理器。

  提供:
    - vision:   describe_image_from_url / detect_image_intent / has_active_vlm
    - web_search: web_search / format_web_results
    - knowledge_base: KnowledgeBase / get_knowledge_base / tokenize

  用法:
    from astrbot_plugin_suli_services import web_search, KnowledgeBase
    from astrbot_plugin_suli_services.vision import describe_image_from_url
