help: |
  本插件为纯库插件 (library plugin)，不注册任何命令或事件处理器。

  提供:
    - get_bilibili_info:   获取B站视频元数据 (不下文件)
    - download_bilibili_video: 下载视频到本地 (≤20MB 自动选最优质量)

  用法:
    from astrbot_plugin_suli_video.bilibili import get_bilibili_info, download_bilibili_video
