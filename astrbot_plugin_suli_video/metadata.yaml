description: 粟藜视频服务层 — B站/抖音视频链接解析 + 下载，供其他插件 import 使用。纯库插件。
desc: 视频提取：B站视频链接解析与下载
repo: https://github.com/math89423-star/suli_qqbot
category: 基础设施
tags:
  - 视频
