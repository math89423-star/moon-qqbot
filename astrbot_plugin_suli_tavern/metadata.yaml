help: |
  私聊/群聊发送：
  - /role <消息>            与粟藜角色扮演
  - /role reset             重置会话
  - /role help              显示帮助
  - /role group status      查看群聊状态
  - 直接发消息即可自动角色扮演（私聊无需 /role 前缀）
  - 群聊中 @粟藜 或喊名字触发自然对话
  - 发送图片 @粟藜 可触发识图

  管理命令：
  - Web 管理面板: 群聊白名单/配置/记忆管理
